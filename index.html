<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Whack-a-Mole - 80 y 90 Radio</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 10px;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }
        
        h1 { 
            margin: 10px 0; 
            color: #ffdd59; 
            font-size: clamp(20px, 5vw, 28px);
            text-align: center;
        }
        
        #ui-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 5px;
            font-size: clamp(16px, 4vw, 20px);
        }
        
        #level-display {
            font-size: clamp(14px, 3.5vw, 18px);
            color: #4ecdc4;
            margin-bottom: 5px;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        
        #danger-warning {
            font-size: clamp(12px, 3vw, 16px);
            color: #ff6b6b;
            margin-bottom: 5px;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            display: none;
            animation: warningPulse 1s ease-in-out infinite;
        }
        @keyframes warningPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        #game-board {
            position: relative;
            width: min(400px, 90vw);
            height: min(300px, 67.5vw);
            background: linear-gradient(180deg, #8B7355 0%, #4A3728 100%);
            border-radius: 10px;
            border: 4px solid #5D4037;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }
        #game-board::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 20px;
            background: #4CAF50;
        }
        .hole {
            position: absolute;
            width: min(70px, 15.75vw);
            height: min(35px, 7.875vw);
            background: radial-gradient(ellipse at center, #1a1a1a 0%, #000000 50%, #1a1a1a 100%);
            border-radius: 50%;
            border: 3px solid #3E2723;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.8), 0 2px 5px rgba(0,0,0,0.3);
            z-index: 10;
            -webkit-tap-highlight-color: transparent;
        }
        .row-1 { bottom: min(180px, 40.5vw); }
        .row-2 { bottom: min(100px, 22.5vw); }
        .row-3 { bottom: min(20px, 4.5vw); }
        [data-index="0"] { left: min(35px, 7.875vw); }
        [data-index="1"] { left: min(155px, 34.875vw); }
        [data-index="2"] { left: min(275px, 61.875vw); }
        [data-index="3"] { left: min(35px, 7.875vw); }
        [data-index="4"] { left: min(155px, 34.875vw); }
        [data-index="5"] { left: min(275px, 61.875vw); }
        [data-index="6"] { left: min(35px, 7.875vw); }
        [data-index="7"] { left: min(155px, 34.875vw); }
        [data-index="8"] { left: min(275px, 61.875vw); }
        .mole {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: min(60px, 13.5vw);
            height: min(60px, 13.5vw);
            cursor: pointer;
            z-index: 15;
            animation: popUp 0.3s ease-out forwards;
            -webkit-tap-highlight-color: transparent;
        }
        .mole img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
            -webkit-user-drag: none;
            user-select: none;
            pointer-events: none;
        }
        @keyframes popUp {
            0% { bottom: min(-60px, -13.5vw); transform: translateX(-50%) scale(0.5); }
            100% { bottom: 0px; transform: translateX(-50%) scale(1); }
        }
        .mole.hiding {
            animation: hideDown 0.3s ease-in forwards !important;
            pointer-events: none;
        }
        @keyframes hideDown {
            0% { bottom: 0px; transform: translateX(-50%) scale(1); opacity: 1; }
            100% { bottom: min(-60px, -13.5vw); transform: translateX(-50%) scale(0.5); opacity: 0; }
        }
        .mole.hit {
            animation: hit 0.2s ease-out forwards;
        }
        @keyframes hit {
            0% { bottom: 0px; transform: translateX(-50%) scale(1); }
            100% { bottom: min(-60px, -13.5vw); transform: translateX(-50%) scale(0.5); opacity: 0; }
        }
        
        .mole.skull {
            animation: popUp 0.3s ease-out forwards;
        }
        .mole.skull img {
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.3));
        }
        
        .extra-time-clock {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: min(60px, 13.5vw);
            height: min(60px, 13.5vw);
            cursor: pointer;
            z-index: 20;
            animation: popUp 0.3s ease-out forwards;
            -webkit-tap-highlight-color: transparent;
        }
        .extra-time-clock img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
            -webkit-user-drag: none;
            user-select: none;
            pointer-events: none;
        }
        .extra-time-clock.hiding {
            animation: hideDown 0.3s ease-in forwards !important;
            pointer-events: none;
        }
        .extra-time-clock.clicked {
            animation: clockCollect 0.3s ease-out forwards;
            pointer-events: none;
        }
        @keyframes clockCollect {
            0% { bottom: 0px; transform: translateX(-50%) scale(1); opacity: 1; }
            100% { bottom: 100px; transform: translateX(-50%) scale(1.5); opacity: 0; }
        }
        #extra-time-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: clamp(20px, 5vw, 28px);
            font-weight: bold;
            color: #ffdd59;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 15px #ffdd59;
            z-index: 100;
            pointer-events: none;
            display: none;
        }
        #extra-time-text.show {
            display: block;
            animation: textAppear 2s ease-out forwards;
        }
        @keyframes textAppear {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            40% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }
        #encouragement-message {
            position: relative;
            margin-top: 10px;
            font-size: clamp(14px, 3.5vw, 18px);
            font-weight: bold;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 15px #ffdd59;
            background: linear-gradient(135deg, rgba(255,221,89,0.9), rgba(249,202,36,0.9));
            padding: 8px 15px;
            border-radius: 15px;
            z-index: 100;
            pointer-events: none;
            text-align: center;
            min-height: 40px;
            max-width: min(380px, 85vw);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s ease-out;
            word-wrap: break-word;
        }
        #encouragement-message.show {
            opacity: 1;
            transform: scale(1);
            animation: messagePop 1.5s ease-out forwards;
        }
        @keyframes messagePop {
            0% { opacity: 0; transform: scale(0.8); }
            20% { opacity: 1; transform: scale(1.1); }
            40% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1); }
        }
        
        #lives-container {
            margin-top: 10px;
            font-size: clamp(24px, 6vw, 28px);
            letter-spacing: 5px;
            -webkit-tap-highlight-color: transparent;
        }
        .heart {
            display: inline-block;
            animation: heartBeat 1s ease-in-out infinite;
        }
        .heart.lost {
            filter: grayscale(1) brightness(0.5);
            animation: none;
        }
        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 50;
            animation: particleFly 0.6s ease-out forwards;
        }
        @keyframes particleFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
        
        .star {
            position: absolute;
            font-size: 20px;
            pointer-events: none;
            z-index: 51;
            animation: starFly 0.8s ease-out forwards;
        }
        @keyframes starFly {
            0% { transform: translate(0, 0) scale(0) rotate(0deg); opacity: 1; }
            50% { transform: translate(var(--tx1), var(--ty1)) scale(1.5) rotate(180deg); opacity: 1; }
            100% { transform: translate(var(--tx2), var(--ty2)) scale(0) rotate(360deg); opacity: 0; }
        }
        
        #start-btn, #leaderboard-btn {
            margin-top: 10px;
            padding: 12px 30px;
            font-size: clamp(16px, 4vw, 18px);
            background: linear-gradient(135deg, #ffdd59, #f9ca24);
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            color: #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            -webkit-tap-highlight-color: transparent;
        }
        #start-btn:hover, #leaderboard-btn:hover { transform: scale(1.05); }
        #start-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        #leaderboard-btn {
            background: linear-gradient(135deg, #4ecdc4, #44a3aa);
            color: white;
        }
        
        #sound-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid white;
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 20px;
            cursor: pointer;
            z-index: 150;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            -webkit-tap-highlight-color: transparent;
        }
        #sound-btn:hover {
            background: rgba(0,0,0,0.5);
            transform: scale(1.1);
            border-color: #ffdd59;
        }
        .radio-container {
            position: fixed;
            top: 10px;
            left: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 150;
            gap: 5px;
            -webkit-tap-highlight-color: transparent;
        }
        #radio-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid white;
            background: rgba(0,0,0,0.3);
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        #radio-btn:hover {
            background: rgba(0,0,0,0.5);
            transform: scale(1.1);
            border-color: #ffdd59;
        }
        .radio-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }
        .radio-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(0,0,0,0.8);
            color: white;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
        }
        #radio-btn.loading .radio-overlay {
            opacity: 1;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #radio-btn.playing {
            border-color: #ff6b6b;
            animation: pulse-radio 2s infinite;
        }
        @keyframes pulse-radio {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.4); }
            50% { box-shadow: 0 0 0 12px rgba(255, 107, 107, 0); }
        }
        .radio-label {
            font-size: 10px;
            color: white;
            text-align: center;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            white-space: nowrap;
            font-weight: 500;
            max-width: 90px;
        }
        
        #game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            -webkit-tap-highlight-color: transparent;
        }
        .game-over-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 3px solid rgba(255,255,255,0.3);
            width: min(400px, 90vw);
            max-width: 95%;
        }
        .game-over-title {
            font-size: clamp(24px, 6vw, 32px);
            font-weight: bold;
            color: #ff6b6b;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .game-over-message {
            font-size: clamp(14px, 3.5vw, 16px);
            color: #ffffff;
            margin-bottom: 20px;
        }
        .game-over-score {
            font-size: clamp(32px, 8vw, 42px);
            font-weight: bold;
            color: #ffdd59;
            margin-bottom: 25px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        #leaderboard-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            -webkit-tap-highlight-color: transparent;
        }
        .leaderboard-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 3px solid rgba(255,255,255,0.3);
            width: min(400px, 90vw);
            max-width: 95%;
            max-height: 80vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .leaderboard-title {
            font-size: clamp(24px, 6vw, 32px);
            font-weight: bold;
            color: #ffdd59;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .leaderboard-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            margin: 6px 0;
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            font-size: clamp(14px, 3.5vw, 16px);
            transition: transform 0.2s;
        }
        .leaderboard-item:hover {
            transform: scale(1.02);
            background: rgba(255,255,255,0.25);
        }
        .leaderboard-item.top-1 {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            font-weight: bold;
            font-size: clamp(16px, 4vw, 18px);
        }
        .leaderboard-item.top-2 {
            background: linear-gradient(135deg, #c0c0c0, #a0a0a0);
            font-weight: bold;
        }
        .leaderboard-item.top-3 {
            background: linear-gradient(135deg, #cd7f32, #b87333);
            font-weight: bold;
        }
        .leaderboard-item.current-user {
            border: 2px solid #ffdd59;
            background: rgba(255,221,89,0.3);
        }
        .rank-number {
            font-size: clamp(18px, 4.5vw, 24px);
            font-weight: bold;
            margin-right: 10px;
            min-width: 35px;
        }
        .user-name {
            flex: 1;
            text-align: left;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .user-score {
            font-weight: bold;
            color: #ffdd59;
            font-size: clamp(16px, 4vw, 18px);
        }
        #close-leaderboard {
            margin-top: 15px;
            padding: 10px 25px;
            font-size: clamp(14px, 3.5vw, 16px);
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        #close-leaderboard:hover { transform: scale(1.05); }
        
        #restart-btn, #show-leaderboard-btn {
            margin-top: 10px;
            padding: 10px 25px;
            font-size: clamp(14px, 3.5vw, 16px);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        #restart-btn {
            background: linear-gradient(135deg, #ffdd59, #f9ca24);
            color: #333;
        }
        #show-leaderboard-btn {
            background: linear-gradient(135deg, #4ecdc4, #44a3aa);
            color: white;
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <audio id="radio-audio" preload="none" crossorigin="anonymous">
        <source src="https://stream.zeno.fm/ndhkmuknva0uv" type="audio/mpeg">
    </audio>

    <h1>🔨 Whack-a-Mole</h1>
    
    <div id="ui-bar">
        <div>⏱️ <span id="timer">30</span>s</div>
        <div>🎯 <span id="score">0</span></div>
    </div>
    
    <div id="level-display">⭐ Modo Novato</div>
    
    <div id="danger-warning">⚠️ ¡CUIDADO! NO TOQUES LA CALAVERA 💀</div>
    
    <div id="game-board">
        <div id="extra-time-text">⏰ ¡TIEMPO EXTRA!</div>
    </div>
    
    <div id="encouragement-message"></div>
    
    <div id="lives-container">
        <span class="heart" id="heart-1">❤️</span>
        <span class="heart" id="heart-2">❤️</span>
        <span class="heart" id="heart-3">❤️</span>
        <span class="heart" id="heart-4">❤️</span>
    </div>
    
    <button id="start-btn" onclick="startGame()">▶️ Jugar</button>
    <button id="leaderboard-btn" onclick="showLeaderboard()">🏆 Ranking</button>
    <button id="sound-btn" onclick="toggleSound()" title="Activar/Desactivar Sonido">🔊</button>
    
    <div class="radio-container">
        <button id="radio-btn" onclick="toggleRadio()" title="Escuchar 80 y 90 Radio">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgqvizWNyyqSmA1V6SOmns4wLWw849mHxRjABDTG0o2iyoHbsDPc9nc0rQW4iW6bfpIQLNn6pOgPlWsygdsuMury7g3ss1yJwDOJY1kHXyQwi53Lp9cyIMduU3NzUVaeme8n6V3_yhhGMEIb5XrCmuBejA6FoE5Uyt9ZmNYAqCxqhFmJf2wA9DpTtz9xg/s640/s80y90.png" 
                 alt="80 y 90 Radio" 
                 class="radio-img"
                 id="radio-img">
            <div class="radio-overlay" id="radio-overlay">🔄</div>
        </button>
        <span class="radio-label">80 y 90 Radio</span>
    </div>
    
    <div id="game-over-screen" class="hidden">
        <div class="game-over-content">
            <div class="game-over-title">💥 ¡Fin del Juego!</div>
            <div class="game-over-message" id="game-over-reason">¡Se acabó el tiempo!</div>
            <div class="game-over-score">🎯 Puntuación: <span id="final-score">0</span></div>
            <button id="restart-btn" onclick="startGame()">🔄 Jugar Otra Vez</button>
            <button id="show-leaderboard-btn" onclick="showLeaderboard()">🏆 Ver Ranking</button>
        </div>
    </div>
    
    <div id="leaderboard-screen" class="hidden">
        <div class="leaderboard-content">
            <div class="leaderboard-title">🏆 TOP 10 JUGADORES</div>
            <ul id="leaderboard-list" class="leaderboard-list"></ul>
            <button id="close-leaderboard" onclick="closeLeaderboard()">❌ Cerrar</button>
        </div>
    </div>

    <script>
        // ✅ PREVENIR SCROLL Y ZOOM
        document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        document.addEventListener('gesturestart', (e) => e.preventDefault());
        document.addEventListener('dblclick', (e) => e.preventDefault(), { passive: false });
        
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe?.user || {};
        const userId = user.id || 'anonymous';
        const userName = user.first_name ? 
            (user.last_name ? `${user.first_name} ${user.last_name}` : user.first_name) : 
            'Jugador';

        const radioAudio = document.getElementById('radio-audio');
        const radioBtn = document.getElementById('radio-btn');
        let radioEnabled = false;
        let radioLoading = false;

        const gameBoard = document.getElementById('game-board');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const levelDisplay = document.getElementById('level-display');
        const startBtn = document.getElementById('start-btn');
        const soundBtn = document.getElementById('sound-btn');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreEl = document.getElementById('final-score');
        const gameOverReason = document.getElementById('game-over-reason');
        const extraTimeText = document.getElementById('extra-time-text');
        const encouragementMessage = document.getElementById('encouragement-message');
        const dangerWarning = document.getElementById('danger-warning');
        const livesContainer = document.getElementById('lives-container');
        const leaderboardScreen = document.getElementById('leaderboard-screen');
        const leaderboardList = document.getElementById('leaderboard-list');
        
        let score = 0;
        let timeLeft = 30;
        let level = 1;
        let lives = 4;
        let gameRunning = false;
        let gameInterval;
        let moleInterval;
        let activeMoles = [];
        let soundEnabled = true;
        let audioContext = null;
        let extraTimeAvailable = false;
        let extraTimeClock = null;
        
        let spawnRate = 600;
        let moleVisibleTime = 1500;
        
        // 🖼️ PRECARGAR IMÁGENES
        const perickkoImage = new Image();
        perickkoImage.src = 'perickko.png';
        const valeforImage = new Image();
        valeforImage.src = 'valefor.png';
        const kikoImage = new Image();
        kikoImage.src = 'kiko.png';
        const nandorsImage = new Image();
        nandorsImage.src = 'nandors.png';
        const alejandoImage = new Image();
        alejandoImage.src = 'alejando.png';
        const cebolloImage = new Image();
        cebolloImage.src = 'cebollo.png';
        const pakitoImage = new Image();
        pakitoImage.src = 'pakito.png';
        const danijuImage = new Image();
        danijuImage.src = 'daniju.png';
        const deividImage = new Image();
        deividImage.src = 'deivid.png';
        const pepinoImage = new Image();
        pepinoImage.src = 'pepino.png';
        const paolaImage = new Image();
        paolaImage.src = 'paola.png';
        const carlitosImage = new Image();
        carlitosImage.src = 'carlitos.png';
        const masmeImage = new Image();
        masmeImage.src = 'masme.png';
        const eduImage = new Image();
        eduImage.src = 'edu.png';
        
        // ✅ NUEVO PERSONAJE: ALFARO
        const alfaroImage = new Image();
        alfaroImage.src = 'alfaro.png';
        
        const skullImage = new Image();
        skullImage.src = 'calavera.png';
        const relojImage = new Image();
        relojImage.src = 'reloj.png';

        const levelNames = [
            '⭐ Modo Novato', '🎯 Modo Aprendiz', '🔨 Modo Golpeador', '💪 Modo Valiente',
            '⚡ Modo Rápido', '🎪 Modo Artista', '🏆 Modo Campeón', '👑 Modo Maestro',
            '🔥 Modo Experto', '💎 Modo Elite', '🌟 Modo Leyenda', '🚀 Modo Cohete',
            '⚡ Modo Rayo', '🎯 Modo Francotirador', '💀 Modo Destructor', '👹 Modo Demonio',
            '🤖 Modo Máquina', '👽 Modo Alien', '🦸 Modo Superhéroe', '🔥 Modo PUTO AMO',
            '💀 MODO DIOS'
        ];

        const encouragementMessages = [
            '¡Vamos, tú puedes! 💪', '¡Dale duro! 🔨', '¡Más rápido! ⚡', '¡Así se hace! 👑',
            '¡Whola! 😎', '¡Eres una bestia! 🦾', '¡Dale que te doy! 💥', '¡Qué locura! 🤪',
            '¡Imparable! 🔥', '¡Eres leyenda! 🌟', '¡Sigue así! 🤖', '¡Esto es arte! 🎨',
            '¡Brutal! 💀', '¡Eres un dios! ⚡', '¡Qué nivel! 😱', '¡Otro rollo! 🎮',
            '¡PUTO AMO! 👑', '¡No te paras! 🚧', '¡Nivel dios! 🙏', '¡A tope! 🚀'
        ];

        const milestoneMessages = {
            50: '¡50 Puntos! Modo Aprendiz 🎯', 100: '¡100 Puntos! Doble dígito 💯',
            150: '¡150 Puntos! Valiente 💪', 200: '¡200 Puntos! Rápido ⚡',
            250: '¡250 Puntos! Artista 🎨', 300: '¡300 Puntos! Campeón 🏆',
            350: '¡350 Puntos! Maestro 🧙', 400: '¡400 Puntos! ¡CUIDADO CON LA CALAVERA! 💀',
            450: '¡450 Puntos! Élite 💎', 500: '¡500 Puntos! LEYENDA 🌟',
            600: '¡600 Puntos! Luz ⚡', 700: '¡700 Puntos! Destructor 💀',
            800: '¡800 Puntos! MÁQUINA 🤖', 900: '¡900 Puntos! SUPERHÉROE 🦸',
            1000: '¡1000 Puntos! PUTO AMO 🔥', 1500: '¡1500 Puntos! ¿ERES DIOS? 💀',
            2000: '¡2000 Puntos! IMPOSIBLE 🤯'
        };

        function updateGameSpeed() {
            if (level <= 20) {
                spawnRate = Math.max(200, 600 - (level - 1) * 20);
                moleVisibleTime = Math.max(500, 1500 - (level - 1) * 50);
            } else {
                const diosLevel = level - 20;
                spawnRate = Math.max(80, 600 - (20 * 20) - (diosLevel * 10));
                moleVisibleTime = Math.max(200, 1500 - (20 * 50) - (diosLevel * 25));
            }
            if (gameRunning) {
                clearInterval(moleInterval);
                moleInterval = setInterval(spawnMole, spawnRate);
            }
        }

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playSound(type) {
            if (!soundEnabled || !audioContext) return;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            if (type === 'whack') {
                osc.frequency.value = 600; osc.type = 'sine';
                gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                osc.start(); osc.stop(audioContext.currentTime + 0.1);
            } else if (type === 'skull') {
                osc.frequency.value = 150; osc.type = 'sawtooth';
                gain.gain.setValueAtTime(0.4, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                osc.start(); osc.stop(audioContext.currentTime + 0.5);
            } else if (type === 'start') {
                osc.frequency.value = 440; osc.type = 'sine';
                gain.gain.setValueAtTime(0.2, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                osc.start(); osc.stop(audioContext.currentTime + 0.2);
            } else if (type === 'gameover') {
                osc.frequency.value = 200; osc.type = 'sawtooth';
                gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);
                osc.start(); osc.stop(audioContext.currentTime + 0.4);
            } else if (type === 'hide') {
                osc.frequency.value = 350; osc.type = 'sine';
                gain.gain.setValueAtTime(0.15, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                osc.start(); osc.stop(audioContext.currentTime + 0.2);
            } else if (type === 'extra-time') {
                [500, 700, 900].forEach((f, i) => setTimeout(() => {
                    const o = audioContext.createOscillator(), g = audioContext.createGain();
                    o.connect(g); g.connect(audioContext.destination);
                    o.frequency.value = f; o.type = 'sine';
                    g.gain.setValueAtTime(0.3, audioContext.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                    o.start(); o.stop(audioContext.currentTime + 0.2);
                }, i * 150));
            } else if (type === 'encouragement') {
                osc.frequency.value = 700; osc.type = 'sine';
                gain.gain.setValueAtTime(0.2, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                osc.start(); osc.stop(audioContext.currentTime + 0.2);
            } else if (type === 'level-up') {
                [400, 600, 800].forEach((f, i) => setTimeout(() => {
                    const o = audioContext.createOscillator(), g = audioContext.createGain();
                    o.connect(g); g.connect(audioContext.destination);
                    o.frequency.value = f; o.type = 'sine';
                    g.gain.setValueAtTime(0.25, audioContext.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
                    o.start(); o.stop(audioContext.currentTime + 0.15);
                }, i * 100));
            } else if (type === 'lose-life') {
                osc.frequency.value = 250; osc.type = 'sawtooth';
                gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                osc.start(); osc.stop(audioContext.currentTime + 0.3);
            }
        }
        
        function toggleSound() {
            soundEnabled = !soundEnabled;
            soundBtn.innerText = soundEnabled ? '🔊' : '🔇';
        }
        
        function toggleRadio() {
            if (radioLoading) return;
            radioEnabled = !radioEnabled;
            if (radioEnabled) {
                radioLoading = true;
                radioBtn.classList.add('loading');
                radioAudio.pause();
                radioAudio.currentTime = 0;
                const playPromise = radioAudio.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        radioLoading = false;
                        radioBtn.classList.remove('loading');
                        radioBtn.classList.add('playing');
                    }).catch(error => {
                        console.error('Error al reproducir radio:', error);
                        radioEnabled = false;
                        radioLoading = false;
                        radioBtn.classList.remove('loading', 'playing');
                        alert('❌ No se pudo conectar a 80 y 90 Radio.');
                    });
                }
            } else {
                radioAudio.pause();
                radioBtn.classList.remove('playing', 'loading');
            }
        }
        
        function showEncouragement(isMilestone = false, milestoneScore = 0) {
            let message = isMilestone && milestoneMessages[milestoneScore] ? milestoneMessages[milestoneScore] : 
                encouragementMessages[Math.floor(Math.random() * encouragementMessages.length)];
            encouragementMessage.innerText = message;
            encouragementMessage.classList.remove('show');
            void encouragementMessage.offsetWidth;
            encouragementMessage.classList.add('show');
            playSound('encouragement');
        }
        
        function updateLevel() {
            const newLevel = Math.floor(score / 50) + 1;
            if (newLevel > level) {
                level = newLevel;
                if (level % 5 === 0 || level === 21) {
                    if (level >= 21) {
                        levelDisplay.innerText = '💀 MODO DIOS ' + (level - 20);
                        levelDisplay.style.color = '#ff6b6b';
                    } else {
                        levelDisplay.innerText = levelNames[level - 1];
                        levelDisplay.style.color = '#4ecdc4';
                    }
                    showEncouragement(true, score);
                    playSound('level-up');
                } else {
                    if (level >= 21) {
                        levelDisplay.innerText = '💀 MODO DIOS ' + (level - 20);
                        levelDisplay.style.color = '#ff6b6b';
                    } else {
                        levelDisplay.innerText = levelNames[level - 1];
                        levelDisplay.style.color = '#4ecdc4';
                    }
                }
                updateGameSpeed();
            }
        }
        
        function updateLivesDisplay() {
            for (let i = 1; i <= 4; i++) {
                const heart = document.getElementById(`heart-${i}`);
                if (i <= lives) {
                    heart.classList.remove('lost');
                    heart.innerText = '❤️';
                } else {
                    heart.classList.add('lost');
                    heart.innerText = '🖤';
                }
            }
        }
        
        function loseLife(reason) {
            lives--;
            updateLivesDisplay();
            playSound('lose-life');
            if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            if (lives <= 0) endGame(reason);
        }
        
        function createHoles() {
            gameBoard.innerHTML = '';
            gameBoard.appendChild(extraTimeText);
            for (let i = 0; i < 9; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole';
                hole.dataset.index = i;
                if (i < 3) hole.classList.add('row-1');
                else if (i < 6) hole.classList.add('row-2');
                else hole.classList.add('row-3');
                gameBoard.appendChild(hole);
            }
        }
        
        function getRandomBirdImage() {
            if (score >= 400 && Math.random() < 0.10) {
                return { image: skullImage, name: 'skull', isSkull: true };
            }
            // ✅ ALFARO AÑADIDO AL ARRAY DE PERSONAJES
            const birds = [
                perickkoImage, valeforImage, kikoImage, nandorsImage, 
                alejandoImage, cebolloImage, pakitoImage, danijuImage, 
                deividImage, pepinoImage, paolaImage, carlitosImage, 
                masmeImage, eduImage, alfaroImage
            ];
            return { image: birds[Math.floor(Math.random() * birds.length)], name: 'bird', isSkull: false };
        }
        
        // ✅ FUNCIÓN CORREGIDA: pointerdown para touch + ratón
        function spawnMole() {
            if (!gameRunning) return;
            const available = [0,1,2,3,4,5,6,7,8].filter(i => !activeMoles.includes(i));
            if (available.length === 0) return;
            const index = available[Math.floor(Math.random() * available.length)];
            const hole = document.querySelector(`[data-index="${index}"]`);
            const mole = document.createElement('div');
            mole.className = 'mole';
            const img = document.createElement('img');
            const randomBird = getRandomBirdImage();
            img.src = randomBird.image.src;
            
            // ✅ FUNCIÓN COMÚN PARA GOLPEAR (touch y ratón)
            const handleHit = (e) => {
                if (e) { e.preventDefault(); e.stopPropagation(); }
                if (randomBird.isSkull) {
                    playSound('skull');
                    loseLife('💀 ¡Tocaste la calavera!');
                    mole.classList.add('hit');
                    setTimeout(() => { if (mole.parentNode) { mole.remove(); activeMoles = activeMoles.filter(i => i !== index); } }, 200);
                } else {
                    whack(index, mole);
                }
            };
            
            if (randomBird.isSkull) {
                mole.classList.add('skull');
                img.alt = 'Calavera';
                mole.dataset.isSkull = 'true';
            } else {
                img.alt = randomBird.name;
                mole.dataset.isSkull = 'false';
            }
            mole.appendChild(img);
            
            // ✅ pointerdown funciona para touch Y ratón
            mole.addEventListener('pointerdown', handleHit, { passive: false });
            // Fallback para navegadores muy antiguos
            mole.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); });
            
            hole.appendChild(mole);
            activeMoles.push(index);
            setTimeout(() => { if (mole.parentNode && !mole.classList.contains('hit') && !mole.classList.contains('hiding')) hideMole(mole, index); }, moleVisibleTime);
        }
        
        function hideMole(mole, index) {
            mole.classList.add('hiding');
            playSound('hide');
            setTimeout(() => { if (mole.parentNode) { mole.remove(); activeMoles = activeMoles.filter(i => i !== index); } }, 300);
        }
        
        function createParticles(x, y) {
            const colors = ['#ffdd59', '#4ecdc4', '#ff6b6b', '#a55eea', '#26de81'];
            for (let i = 0; i < 12; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 8 + 4;
                const color = colors[Math.floor(Math.random() * colors.length)];
                particle.style.cssText = `width:${size}px;height:${size}px;background:${color};left:${x}px;top:${y}px;`;
                const angle = (Math.random() * 360) * (Math.PI / 180);
                const dist = Math.random() * 80 + 40;
                particle.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                particle.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                particle.style.animationDuration = (Math.random() * 0.3 + 0.4) + 's';
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 700);
            }
            for (let i = 0; i < 5; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.innerHTML = '⭐';
                star.style.left = x + 'px'; star.style.top = y + 'px';
                const angle = (Math.random() * 360) * (Math.PI / 180);
                const dist1 = Math.random() * 50 + 30, dist2 = Math.random() * 100 + 60;
                star.style.setProperty('--tx1', Math.cos(angle) * dist1 + 'px');
                star.style.setProperty('--ty1', Math.sin(angle) * dist1 + 'px');
                star.style.setProperty('--tx2', Math.cos(angle) * dist2 + 'px');
                star.style.setProperty('--ty2', Math.sin(angle) * dist2 + 'px');
                star.style.animationDuration = (Math.random() * 0.3 + 0.5) + 's';
                document.body.appendChild(star);
                setTimeout(() => star.remove(), 900);
            }
        }
        
        function whack(index, mole) {
            if (!gameRunning || !mole || mole.classList.contains('hit') || mole.classList.contains('hiding')) return;
            mole.classList.add('hit');
            score += 10;
            scoreDisplay.innerText = score;
            playSound('whack');
            const rect = mole.getBoundingClientRect();
            createParticles(rect.left + rect.width / 2, rect.top + rect.height / 2);
            updateLevel();
            if (score >= 400) dangerWarning.style.display = 'block';
            if (score % 50 === 0 && milestoneMessages[score]) showEncouragement(true, score);
            else if (score % 25 === 0) showEncouragement(false);
            setTimeout(() => { if (mole.parentNode) { mole.remove(); activeMoles = activeMoles.filter(i => i !== index); } }, 200);
        }
        
        // ✅ FUNCIÓN CORREGIDA: pointerdown para touch + ratón
        function spawnExtraTimeClock() {
            if (!gameRunning || extraTimeAvailable) return;
            const available = [0,1,2,3,4,5,6,7,8].filter(i => !activeMoles.includes(i));
            if (available.length === 0) return;
            const index = available[Math.floor(Math.random() * available.length)];
            const hole = document.querySelector(`[data-index="${index}"]`);
            extraTimeClock = document.createElement('div');
            extraTimeClock.className = 'extra-time-clock';
            const img = document.createElement('img');
            img.src = relojImage.src; img.alt = 'Reloj Tiempo Extra';
            extraTimeClock.appendChild(img);
            
            // ✅ pointerdown para touch y ratón
            extraTimeClock.addEventListener('pointerdown', (e) => {
                e.preventDefault(); e.stopPropagation();
                collectExtraTime(index);
            }, { passive: false });
            // Fallback para navegadores antiguos
            extraTimeClock.onclick = (e) => { e.preventDefault(); e.stopPropagation(); };
            
            hole.appendChild(extraTimeClock);
            extraTimeAvailable = true;
            setTimeout(() => { if (extraTimeAvailable && gameRunning && extraTimeClock && extraTimeClock.parentNode) hideExtraTimeClock(index); }, 1500);
        }
        
        function hideExtraTimeClock(index) {
            if (!extraTimeClock || !extraTimeClock.parentNode) return;
            extraTimeClock.classList.add('hiding');
            playSound('hide');
            setTimeout(() => { if (extraTimeClock && extraTimeClock.parentNode) { extraTimeClock.remove(); extraTimeClock = null; extraTimeAvailable = false; } }, 300);
        }
        
        function collectExtraTime(index) {
            if (!extraTimeAvailable || !gameRunning || !extraTimeClock) return;
            extraTimeAvailable = false;
            timeLeft += 20;
            timerDisplay.innerText = timeLeft;
            playSound('extra-time');
            extraTimeText.classList.add('show');
            setTimeout(() => extraTimeText.classList.remove('show'), 2000);
            extraTimeClock.classList.add('clicked');
            setTimeout(() => { if (extraTimeClock && extraTimeClock.parentNode) { extraTimeClock.remove(); extraTimeClock = null; } }, 300);
            if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }
        
        function startTimer() {
            timeLeft = 30;
            timerDisplay.innerText = timeLeft;
            extraTimeAvailable = false;
            extraTimeText.classList.remove('show');
            if (extraTimeClock) { extraTimeClock.remove(); extraTimeClock = null; }
            gameInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft;
                if (timeLeft === 5 && !extraTimeAvailable && gameRunning) spawnExtraTimeClock();
                if (timeLeft <= 0) endGame('¡Se acabó el tiempo!');
            }, 1000);
        }
        
        function startGame() {
            if (gameRunning) return;
            initAudio();
            playSound('start');
            score = 0; timeLeft = 30; level = 1; lives = 4;
            spawnRate = 600; moleVisibleTime = 1500;
            activeMoles = []; extraTimeAvailable = false; gameRunning = true;
            scoreDisplay.innerText = score; timerDisplay.innerText = timeLeft;
            levelDisplay.innerText = levelNames[0]; levelDisplay.style.color = '#4ecdc4';
            encouragementMessage.innerText = ''; encouragementMessage.classList.remove('show');
            dangerWarning.style.display = 'none';
            updateLivesDisplay();
            gameOverScreen.classList.add('hidden'); startBtn.style.display = 'none';
            extraTimeText.classList.remove('show');
            if (extraTimeClock) { extraTimeClock.remove(); extraTimeClock = null; }
            createHoles(); startTimer();
            moleInterval = setInterval(spawnMole, spawnRate);
        }
        
        function saveScore() {
            let scores = JSON.parse(localStorage.getItem('whackScores')) || [];
            scores.push({ userId: userId, userName: userName, score: score, date: new Date().toISOString() });
            scores.sort((a, b) => b.score - a.score);
            scores = scores.slice(0, 10);
            localStorage.setItem('whackScores', JSON.stringify(scores));
        }
        
        function showLeaderboard() {
            leaderboardScreen.classList.remove('hidden');
            leaderboardList.innerHTML = '';
            let scores = JSON.parse(localStorage.getItem('whackScores')) || [];
            if (scores.length === 0) {
                leaderboardList.innerHTML = '<li style="padding: 20px; color: white;">📊 Sin puntuaciones aún. ¡Sé el primero!</li>';
                return;
            }
            scores.forEach((entry, index) => {
                const li = document.createElement('li');
                li.className = 'leaderboard-item';
                if (index === 0) li.classList.add('top-1');
                else if (index === 1) li.classList.add('top-2');
                else if (index === 2) li.classList.add('top-3');
                if (entry.userId === userId) li.classList.add('current-user');
                li.innerHTML = `<span class="rank-number">${index + 1}º</span><span class="user-name">${entry.userName}</span><span class="user-score">${entry.score} pts</span>`;
                leaderboardList.appendChild(li);
            });
        }
        
        function closeLeaderboard() {
            leaderboardScreen.classList.add('hidden');
        }
        
        function endGame(reason) {
            gameRunning = false;
            clearInterval(gameInterval);
            clearInterval(moleInterval);
            playSound('gameover');
            if (score > 0) saveScore();
            extraTimeText.classList.remove('show');
            encouragementMessage.classList.remove('show');
            if (extraTimeClock) { extraTimeClock.remove(); extraTimeClock = null; }
            extraTimeAvailable = false;
            gameOverReason.innerText = reason;
            finalScoreEl.innerText = score;
            gameOverScreen.classList.remove('hidden');
        }
        
        createHoles();
    </script>
</body>
