<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Mole - 80 y 90 Radio</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        h1 { margin-bottom: 20px; color: #ffdd59; }
        #ui-bar {
            display: flex;
            gap: 30px;
            margin-bottom: 10px;
            font-size: 20px;
        }
        #level-display {
            font-size: 18px;
            color: #4ecdc4;
            margin-bottom: 10px;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        
        /* ⚠️ ADVERTENCIA DE PELIGRO */
        #danger-warning {
            font-size: 16px;
            color: #ff6b6b;
            margin-bottom: 10px;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            display: none;
            animation: warningPulse 1s ease-in-out infinite;
        }
        @keyframes warningPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        #game-board {
            position: relative;
            width: 400px;
            height: 300px;
            background: linear-gradient(180deg, #8B7355 0%, #4A3728 100%);
            border-radius: 10px;
            border: 4px solid #5D4037;
            overflow: hidden;
        }
        #game-board::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 20px;
            background: #4CAF50;
        }
        .hole {
            position: absolute;
            width: 70px;
            height: 35px;
            background: radial-gradient(ellipse at center, #1a1a1a 0%, #000000 50%, #1a1a1a 100%);
            border-radius: 50%;
            border: 3px solid #3E2723;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.8), 0 2px 5px rgba(0,0,0,0.3);
            z-index: 10;
        }
        .row-1 { bottom: 180px; }
        .row-2 { bottom: 100px; }
        .row-3 { bottom: 20px; }
        [data-index="0"] { left: 35px; }
        [data-index="1"] { left: 155px; }
        [data-index="2"] { left: 275px; }
        [data-index="3"] { left: 35px; }
        [data-index="4"] { left: 155px; }
        [data-index="5"] { left: 275px; }
        [data-index="6"] { left: 35px; }
        [data-index="7"] { left: 155px; }
        [data-index="8"] { left: 275px; }
        .mole {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            cursor: pointer;
            z-index: 15;
            animation: popUp 0.3s ease-out forwards;
        }
        .mole img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }
        @keyframes popUp {
            0% { bottom: -60px; transform: translateX(-50%) scale(0.5); }
            100% { bottom: 0px; transform: translateX(-50%) scale(1); }
        }
        .mole.hiding {
            animation: hideDown 0.3s ease-in forwards !important;
            pointer-events: none;
        }
        @keyframes hideDown {
            0% { bottom: 0px; transform: translateX(-50%) scale(1); opacity: 1; }
            100% { bottom: -60px; transform: translateX(-50%) scale(0.5); opacity: 0; }
        }
        .mole.hit {
            animation: hit 0.2s ease-out forwards;
        }
        @keyframes hit {
            0% { bottom: 0px; transform: translateX(-50%) scale(1); }
            100% { bottom: -60px; transform: translateX(-50%) scale(0.5); opacity: 0; }
        }
        
        /* 💀 CALAVERA (SIN RESPLANDOR ROJO - MÁS SUTIL) */
        .mole.skull {
            animation: popUp 0.3s ease-out forwards;
        }
        .mole.skull img {
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.3));  /* ✅ Sombra normal, SIN rojo */
        }
        
        .extra-time-clock {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            cursor: pointer;
            z-index: 20;
            animation: popUp 0.3s ease-out forwards;
        }
        .extra-time-clock img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }
        .extra-time-clock.hiding {
            animation: hideDown 0.3s ease-in forwards !important;
            pointer-events: none;
        }
        .extra-time-clock.clicked {
            animation: clockCollect 0.3s ease-out forwards;
            pointer-events: none;
        }
        @keyframes clockCollect {
            0% { bottom: 0px; transform: translateX(-50%) scale(1); opacity: 1; }
            100% { bottom: 100px; transform: translateX(-50%) scale(1.5); opacity: 0; }
        }
        #extra-time-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 28px;
            font-weight: bold;
            color: #ffdd59;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 15px #ffdd59;
            z-index: 100;
            pointer-events: none;
            display: none;
        }
        #extra-time-text.show {
            display: block;
            animation: textAppear 2s ease-out forwards;
        }
        @keyframes textAppear {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            40% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }
        #encouragement-message {
            position: relative;
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 15px #ffdd59;
            background: linear-gradient(135deg, rgba(255,221,89,0.9), rgba(249,202,36,0.9));
            padding: 10px 20px;
            border-radius: 15px;
            z-index: 100;
            pointer-events: none;
            text-align: center;
            min-height: 45px;
            max-width: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s ease-out;
            word-wrap: break-word;
        }
        #encouragement-message.show {
            opacity: 1;
            transform: scale(1);
            animation: messagePop 1.5s ease-out forwards;
        }
        @keyframes messagePop {
            0% { opacity: 0; transform: scale(0.8); }
            20% { opacity: 1; transform: scale(1.1); }
            40% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1); }
        }
        
        /* ❤️ VIDAS (CORAZONES) */
        #lives-container {
            margin-top: 15px;
            font-size: 28px;
            letter-spacing: 5px;
        }
        .heart {
            display: inline-block;
            animation: heartBeat 1s ease-in-out infinite;
        }
        .heart.lost {
            filter: grayscale(1) brightness(0.5);
            animation: none;
        }
        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        /* ✨ PARTÍCULAS Y ESTRELLAS */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 50;
            animation: particleFly 0.6s ease-out forwards;
        }
        @keyframes particleFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
        
        .star {
            position: absolute;
            font-size: 20px;
            pointer-events: none;
            z-index: 51;
            animation: starFly 0.8s ease-out forwards;
        }
        @keyframes starFly {
            0% { transform: translate(0, 0) scale(0) rotate(0deg); opacity: 1; }
            50% { transform: translate(var(--tx1), var(--ty1)) scale(1.5) rotate(180deg); opacity: 1; }
            100% { transform: translate(var(--tx2), var(--ty2)) scale(0) rotate(360deg); opacity: 0; }
        }
        
        #start-btn {
            margin-top: 15px;
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(135deg, #ffdd59, #f9ca24);
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            color: #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        #start-btn:hover { transform: scale(1.05); }
        #start-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        #sound-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid white;
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 150;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        #sound-btn:hover {
            background: rgba(0,0,0,0.5);
            transform: scale(1.1);
            border-color: #ffdd59;
        }
        .radio-container {
            position: fixed;
            top: 15px;
            left: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 150;
            gap: 8px;
        }
        #radio-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid white;
            background: rgba(0,0,0,0.3);
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        #radio-btn:hover {
            background: rgba(0,0,0,0.5);
            transform: scale(1.1);
            border-color: #ffdd59;
        }
        .radio-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }
        .radio-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(0,0,0,0.8);
            color: white;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
        }
        #radio-btn.loading .radio-overlay {
            opacity: 1;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #radio-btn.playing {
            border-color: #ff6b6b;
            animation: pulse-radio 2s infinite;
        }
        @keyframes pulse-radio {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.4); }
            50% { box-shadow: 0 0 0 12px rgba(255, 107, 107, 0); }
        }
        .radio-label {
            font-size: 11px;
            color: white;
            text-align: center;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            white-space: nowrap;
            font-weight: 500;
            max-width: 100px;
        }
        #game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .game-over-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 3px solid rgba(255,255,255,0.3);
        }
        .game-over-title {
            font-size: 36px;
            font-weight: bold;
            color: #ff6b6b;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .game-over-message {
            font-size: 18px;
            color: #ffffff;
            margin-bottom: 20px;
        }
        .game-over-score {
            font-size: 48px;
            font-weight: bold;
            color: #ffdd59;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .hidden { display: none !important; }
    </style>
</head>

    <div class="radio-container">

            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgqvizWNyyqSmA1V6SOmns4wLWw849mHxRjABDTG0o2iyoHbsDPc9nc0rQW4iW6bfpIQLNn6pOgPlWsygdsuMury7g3ss1yJwDOJY1kHXyQwi53Lp9cyIMduU3NzUVaeme8n6V3_yhhGMEIb5XrCmuBejA6FoE5Uyt9ZmNYAqCxqhFmJf2wA9DpTtz9xg/s640/s80y90.png" 
                 alt="80 y 90 Radio"

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const radioAudio = document.getElementById('radio-audio');
        const radioBtn = document.getElementById('radio-btn');
        let radioEnabled = false;
        let radioLoading = false;

        const gameBoard = document.getElementById('game-board');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const levelDisplay = document.getElementById('level-display');
        const startBtn = document.getElementById('start-btn');
        const soundBtn = document.getElementById('sound-btn');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreEl = document.getElementById('final-score');
        const gameOverReason = document.getElementById('game-over-reason');
        const extraTimeText = document.getElementById('extra-time-text');
        const encouragementMessage = document.getElementById('encouragement-message');
        const dangerWarning = document.getElementById('danger-warning');
        const livesContainer = document.getElementById('lives-container');
        
        let score = 0;
        let timeLeft = 30;
        let level = 1;
        let lives = 4;
        let gameRunning = false;
        let gameInterval;
        let moleInterval;
        let activeMoles = [];
        let soundEnabled = true;
        let audioContext = null;
        let extraTimeAvailable = false;
        let extraTimeClock = null;
        
        let spawnRate = 600;
        let moleVisibleTime = 1500;
        
        // 🖼️ PRECARGAR LAS 15 IMÁGENES
        const perickkoImage = new Image();
        perickkoImage.src = 'perickko.png';
        
        const valeforImage = new Image();

        const kikoImage = new Image();

        const nandorsImage = new Image();

        const alejandoImage = new Image();

        const cebolloImage = new Image();

        const pakitoImage = new Image();

        const danijuImage = new Image();
        danijuImage.src = 'daniju.png';
        
        const deividImage = new Image();
        deividImage.src = 'deivid.png';
        
        const pepinoImage = new Image();
        pepinoImage.src = 'pepino.png';
        
        const paolaImage = new Image();
        paolaImage.src = 'paola.png';
        
        const carlitosImage = new Image();
        carlitosImage.src = 'carlitos.png';
        
        const masmeImage = new Image();
        masmeImage.src = 'masme.png';
        
        const eduImage = new Image();
        eduImage.src = 'edu.png';
        
        const skullImage = new Image();
        skullImage.src = 'calavera.png';
        
        // ⏰ PRECARGAR IMAGEN DEL RELOJ
        const relojImage = new Image();
        relojImage.src = 'reloj.png';

        const levelNames = [
            '⭐ Modo Novato',
            '🎯 Modo Aprendiz',
            '🔨 Modo Golpeador',
            '💪 Modo Valiente',
            '⚡ Modo Rápido',
            '🎪 Modo Artista',
            '🏆 Modo Campeón',
            '👑 Modo Maestro',
            '🔥 Modo Experto',
            '💎 Modo Elite',
            '🌟 Modo Leyenda',
            '🚀 Modo Cohete',
            '⚡ Modo Rayo',
            '🎯 Modo Francotirador',
            '💀 Modo Destructor',
            '👹 Modo Demonio',
            '🤖 Modo Máquina',
            '👽 Modo Alien',
            '🦸 Modo Superhéroe',
            '🔥 Modo PUTO AMO',
            '💀 MODO DIOS'
        ];

        const encouragementMessages = [
            '¡Vamos, tú puedes! 💪',
            '¡Dale duro! 🔨',
            '¡Más rápido! ⚡',
            '¡Así se hace! 👑',
            '¡Whola! 😎',
            '¡Eres una bestia! 🦾',
            '¡Dale que te doy! 💥',
            '¡Qué locura! 🤪',
            '¡Imparable! 🔥',

            '¡Sigue así! 🤖',
            '¡Esto es arte! 🎨',
            '¡Brutal! 💀',

            '¡PUTO AMO! 👑',

            '¡A tope! 🚀'
        ];

        const milestoneMessages = {
            50: '¡50 Puntos! Modo Aprendiz 🎯',
            100: '¡100 Puntos! Doble dígito 💯',
            150: '¡150 Puntos! Valiente 💪',
            200: '¡200 Puntos! Rápido ⚡',
            250: '¡250 Puntos! Artista 🎨',
            300: '¡300 Puntos! Campeón 🏆',
            350: '¡350 Puntos! Maestro 🧙',
            400: '¡400 Puntos! ¡CUIDADO CON LA CALAVERA! 💀',
            450: '¡450 Puntos! Élite 💎',
            500: '¡500 Puntos! LEYENDA 🌟',
            600: '¡600 Puntos! Luz ⚡',
            700: '¡700 Puntos! Destructor 💀',
            800: '¡800 Puntos! MÁQUINA 🤖',
            900: '¡900 Puntos! SUPERHÉROE 🦸',
            1000: '¡1000 Puntos! PUTO AMO 🔥',
            1500: '¡1500 Puntos! ¿ERES DIOS? 💀',
            2000: '¡2000 Puntos! IMPOSIBLE 🤯'
        };

        function updateGameSpeed() {
            if (level <= 20) {
                spawnRate = Math.max(200, 600 - (level - 1) * 20);
                moleVisibleTime = Math.max(500, 1500 - (level - 1) * 50);
            } else {
                const diosLevel = level - 20;
                spawnRate = Math.max(80, 600 - (20 * 20) - (diosLevel * 10));
                moleVisibleTime = Math.max(200, 1500 - (20 * 50) - (diosLevel * 25));
            }
            
            if (gameRunning) {
                clearInterval(moleInterval);
                moleInterval = setInterval(spawnMole, spawnRate);
            }
        }

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playSound(type) {
            if (!soundEnabled || !audioContext) return;
            
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            if (type === 'whack') {
                osc.frequency.value = 600;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                osc.start();
                osc.stop(audioContext.currentTime + 0.1);
            } else if (type === 'skull') {
                osc.frequency.value = 150;
                osc.type = 'sawtooth';
                gain.gain.setValueAtTime(0.4, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                osc.start();
                osc.stop(audioContext.currentTime + 0.5);
            } else if (type === 'start') {
                osc.frequency.value = 440;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.2, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                osc.start();
                osc.stop(audioContext.currentTime + 0.2);
            } else if (type === 'gameover') {
                osc.frequency.value = 200;
                osc.type = 'sawtooth';
                gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);
                osc.start();
                osc.stop(audioContext.currentTime + 0.4);
            } else if (type === 'hide') {
                osc.frequency.value = 350;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.15, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                osc.start();
                osc.stop(audioContext.currentTime + 0.2);
            } else if (type === 'extra-time') {
                [500, 700, 900].forEach((f, i) => setTimeout(() => {
                    const o = audioContext.createOscillator(), g = audioContext.createGain();
                    o.connect(g); g.connect(audioContext.destination);
                    o.frequency.value = f; o.type = 'sine';
                    g.gain.setValueAtTime(0.3, audioContext.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                    o.start(); o.stop(audioContext.currentTime + 0.2);
                }, i * 150));
            } else if (type === 'encouragement') {
                osc.frequency.value = 700;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.2, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                osc.start();
                osc.stop(audioContext.currentTime + 0.2);
            } else if (type === 'level-up') {
                [400, 600, 800].forEach((f, i) => setTimeout(() => {
                    const o = audioContext.createOscillator(), g = audioContext.createGain();
                    o.connect(g); g.connect(audioContext.destination);
                    o.frequency.value = f; o.type = 'sine';
                    g.gain.setValueAtTime(0.25, audioContext.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
                    o.start(); o.stop(audioContext.currentTime + 0.15);
                }, i * 100));
            } else if (type === 'lose-life') {
                osc.frequency.value = 250;
                osc.type = 'sawtooth';
                gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                osc.start();
                osc.stop(audioContext.currentTime + 0.3);
            }
        }
        
        function toggleSound() {
            soundEnabled = !soundEnabled;
            soundBtn.innerText = soundEnabled ? '🔊' : '🔇';
        }
        
        function toggleRadio() {
            if (radioLoading) return;
            radioEnabled = !radioEnabled;
            
            if (radioEnabled) {
                radioLoading = true;
                radioBtn.classList.add('loading');
                radioAudio.pause();
                radioAudio.currentTime = 0;
                
                const playPromise = radioAudio.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        radioLoading = false;
                        radioBtn.classList.remove('loading');
                        radioBtn.classList.add('playing');
                    }).catch(error => {
                        console.error('Error al reproducir radio:', error);
                        radioEnabled = false;
                        radioLoading = false;
                        radioBtn.classList.remove('loading', 'playing');
                        alert('❌ No se pudo conectar a 80 y 90 Radio.');
                    });
                }
            } else {
                radioAudio.pause();
                radioBtn.classList.remove('playing', 'loading');
            }
        }
        
        function showEncouragement(isMilestone = false, milestoneScore = 0) {
            let message = '';
            
            if (isMilestone && milestoneMessages[milestoneScore]) {
                message = milestoneMessages[milestoneScore];
            } else {
                message = encouragementMessages[Math.floor(Math.random() * encouragementMessages.length)];
            }
            
            encouragementMessage.innerText = message;
            encouragementMessage.classList.remove('show');
            void encouragementMessage.offsetWidth;
            encouragementMessage.classList.add('show');
            playSound('encouragement');
        }
        
        function updateLevel() {
            const newLevel = Math.floor(score / 50) + 1;
            
            if (newLevel > level) {
                level = newLevel;
                
                if (level % 5 === 0 || level === 21) {
                    if (level >= 21) {
                        levelDisplay.innerText = '💀 MODO DIOS ' + (level - 20);
                        levelDisplay.style.color = '#ff6b6b';
                    } else {
                        levelDisplay.innerText = levelNames[level - 1];
                        levelDisplay.style.color = '#4ecdc4';
                    }
                    showEncouragement(true, score);
                    playSound('level-up');
                } else {
                    if (level >= 21) {
                        levelDisplay.innerText = '💀 MODO DIOS ' + (level - 20);
                        levelDisplay.style.color = '#ff6b6b';
                    } else {
                        levelDisplay.innerText = levelNames[level - 1];
                        levelDisplay.style.color = '#4ecdc4';
                    }
                }
                
                updateGameSpeed();
            }
        }
        
        function updateLivesDisplay() {
            for (let i = 1; i <= 4; i++) {
                const heart = document.getElementById(`heart-${i}`);
                if (i <= lives) {
                    heart.classList.remove('lost');
                    heart.innerText = '❤️';
                } else {
                    heart.classList.add('lost');
                    heart.innerText = '🖤';
                }
            }
        }
        
        function loseLife(reason) {
            lives--;
            updateLivesDisplay();
            playSound('lose-life');
            
            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('error');
            }
            
            if (lives <= 0) {
                endGame(reason);
            }
        }
        
        function createHoles() {
            gameBoard.innerHTML = '';
            gameBoard.appendChild(extraTimeText);
            
            for (let i = 0; i < 9; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole';
                hole.dataset.index = i;
                
                if (i < 3) hole.classList.add('row-1');
                else if (i < 6) hole.classList.add('row-2');
                else hole.classList.add('row-3');
                
                gameBoard.appendChild(hole);
            }
        }
        
        // 🎲 OBTENER IMAGEN ALEATORIA
        function getRandomBirdImage() {
            if (score >= 400 && Math.random() < 0.10) {
                return { image: skullImage, name: 'skull', isSkull: true };
            }
            
            const birds = [perickkoImage, valeforImage, kikoImage, nandorsImage, alejandoImage, cebolloImage, pakitoImage, danijuImage, deividImage, pepinoImage, paolaImage, carlitosImage, masmeImage, eduImage];
            const randomIndex = Math.floor(Math.random() * birds.length);
            return { image: birds[randomIndex], name: 'bird', isSkull: false };
        }
        
        function spawnMole() {
            if (!gameRunning) return;
            
            const available = [0,1,2,3,4,5,6,7,8].filter(i => !activeMoles.includes(i));
            if (available.length === 0) return;
            
            const index = available[Math.floor(Math.random() * available.length)];
            const hole = document.querySelector(`[data-index="${index}"]`);
            
            const mole = document.createElement('div');
            mole.className = 'mole';
            
            const img = document.createElement('img');
            const randomBird = getRandomBirdImage();
            img.src = randomBird.image.src;
            
            if (randomBird.isSkull) {
                mole.classList.add('skull');
                img.alt = 'Calavera';
                mole.dataset.isSkull = 'true';
                
                mole.addEventListener('click', (e) => {
                    e.stopPropagation();
                    playSound('skull');
                    loseLife('💀 ¡Tocaste la calavera!');
                    mole.classList.add('hit');
                    setTimeout(() => {
                        if (mole.parentNode) {
                            mole.remove();
                            activeMoles = activeMoles.filter(i => i !== index);
                        }
                    }, 200);
                });
            } else {
                img.alt = randomBird.name;
                mole.dataset.isSkull = 'false';
                
                mole.addEventListener('click', (e) => {
                    e.stopPropagation();
                    whack(index, mole);
                });
            }
            
            mole.appendChild(img);
            
            hole.appendChild(mole);
            activeMoles.push(index);
            
            setTimeout(() => {
                if (mole.parentNode && !mole.classList.contains('hit') && !mole.classList.contains('hiding')) {
                    hideMole(mole, index);
                }
            }, moleVisibleTime);
        }
        
        function hideMole(mole, index) {
            mole.classList.add('hiding');
            playSound('hide');
            
            setTimeout(() => {
                if (mole.parentNode) {
                    mole.remove();
                    activeMoles = activeMoles.filter(i => i !== index);
                }
            }, 300);
        }
        
        // ✨ CREAR PARTÍCULAS
        function createParticles(x, y) {
            const colors = ['#ffdd59', '#4ecdc4', '#ff6b6b', '#a55eea', '#26de81'];
            
            // Partículas
            for (let i = 0; i < 12; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 8 + 4;
                const color = colors[Math.floor(Math.random() * colors.length)];
                particle.style.cssText = `width:${size}px;height:${size}px;background:${color};left:${x}px;top:${y}px;`;
                
                const angle = (Math.random() * 360) * (Math.PI / 180);
                const dist = Math.random() * 80 + 40;
                particle.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                particle.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                particle.style.animationDuration = (Math.random() * 0.3 + 0.4) + 's';
                
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 700);
            }
            
            // Estrellas
            for (let i = 0; i < 5; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.innerHTML = '⭐';
                star.style.left = x + 'px';
                star.style.top = y + 'px';
                
                const angle = (Math.random() * 360) * (Math.PI / 180);
                const dist1 = Math.random() * 50 + 30;
                const dist2 = Math.random() * 100 + 60;
                star.style.setProperty('--tx1', Math.cos(angle) * dist1 + 'px');
                star.style.setProperty('--ty1', Math.sin(angle) * dist1 + 'px');
                star.style.setProperty('--tx2', Math.cos(angle) * dist2 + 'px');
                star.style.setProperty('--ty2', Math.sin(angle) * dist2 + 'px');
                star.style.animationDuration = (Math.random() * 0.3 + 0.5) + 's';
                
                document.body.appendChild(star);
                setTimeout(() => star.remove(), 900);
            }
        }
        
        function whack(index, mole) {
            if (!gameRunning) return;
            
            if (!mole || mole.classList.contains('hit') || mole.classList.contains('hiding')) return;
            
            mole.classList.add('hit');
            score += 10;
            scoreDisplay.innerText = score;
            playSound('whack');
            
            // ✅ CREAR PARTÍCULAS Y ESTRELLAS
            const rect = mole.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            createParticles(x, y);
            
            updateLevel();
            
            if (score >= 400) {
                dangerWarning.style.display = 'block';
            }
            
            if (score % 50 === 0 && milestoneMessages[score]) {
                showEncouragement(true, score);
            } else if (score % 25 === 0) {
                showEncouragement(false);
            }
            
            setTimeout(() => {
                if (mole.parentNode) {
                    mole.remove();
                    activeMoles = activeMoles.filter(i => i !== index);
                }
            }, 200);
        }
        
        function spawnExtraTimeClock() {
            if (!gameRunning || extraTimeAvailable) return;
            
            const available = [0,1,2,3,4,5,6,7,8].filter(i => !activeMoles.includes(i));
            if (available.length === 0) return;
            
            const index = available[Math.floor(Math.random() * available.length)];
            const hole = document.querySelector(`[data-index="${index}"]`);
            
            extraTimeClock = document.createElement('div');
            extraTimeClock.className = 'extra-time-clock';
            
            const img = document.createElement('img');
            img.src = relojImage.src;
            img.alt = 'Reloj Tiempo Extra';
            extraTimeClock.appendChild(img);
            
            extraTimeClock.onclick = (e) => {
                e.stopPropagation();
                collectExtraTime(index);
            };
            
            hole.appendChild(extraTimeClock);
            extraTimeAvailable = true;
            
            setTimeout(() => {
                if (extraTimeAvailable && gameRunning && extraTimeClock && extraTimeClock.parentNode) {
                    hideExtraTimeClock(index);
                }
            }, 1500);
        }
        
        function hideExtraTimeClock(index) {
            if (!extraTimeClock || !extraTimeClock.parentNode) return;
            
            extraTimeClock.classList.add('hiding');
            playSound('hide');
            
            setTimeout(() => {
                if (extraTimeClock && extraTimeClock.parentNode) {
                    extraTimeClock.remove();
                    extraTimeClock = null;
                    extraTimeAvailable = false;
                }
            }, 300);
        }
        
        function collectExtraTime(index) {
            if (!extraTimeAvailable || !gameRunning || !extraTimeClock) return;
            
            extraTimeAvailable = false;
            timeLeft += 20;
            timerDisplay.innerText = timeLeft;
            
            playSound('extra-time');
            
            extraTimeText.classList.add('show');
            
            setTimeout(() => {
                extraTimeText.classList.remove('show');
            }, 2000);
            
            extraTimeClock.classList.add('clicked');
            
            setTimeout(() => {
                if (extraTimeClock && extraTimeClock.parentNode) {
                    extraTimeClock.remove();
                    extraTimeClock = null;
                }
            }, 300);
            
            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
        }
        
        function startTimer() {
            timeLeft = 30;
            timerDisplay.innerText = timeLeft;
            extraTimeAvailable = false;
            extraTimeText.classList.remove('show');
            if (extraTimeClock) {
                extraTimeClock.remove();
                extraTimeClock = null;
            }
            
            gameInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft;
                
                if (timeLeft === 5 && !extraTimeAvailable && gameRunning) {
                    spawnExtraTimeClock();
                }
                
                if (timeLeft <= 0) endGame('¡Se acabó el tiempo!');
            }, 1000);
        }
        
        function startGame() {
            if (gameRunning) return;
            
            initAudio();
            playSound('start');
            
            score = 0;
            timeLeft = 30;
            level = 1;
            lives = 4;
            spawnRate = 600;
            moleVisibleTime = 1500;
            activeMoles = [];
            extraTimeAvailable = false;
            gameRunning = true;
            
            scoreDisplay.innerText = score;
            timerDisplay.innerText = timeLeft;
            levelDisplay.innerText = levelNames[0];
            levelDisplay.style.color = '#4ecdc4';
            encouragementMessage.innerText = '';
            encouragementMessage.classList.remove('show');
            dangerWarning.style.display = 'none';
            
            updateLivesDisplay();
            
            gameOverScreen.classList.add('hidden');
            startBtn.style.display = 'none';
            
            extraTimeText.classList.remove('show');
            if (extraTimeClock) {
                extraTimeClock.remove();
                extraTimeClock = null;
            }
            
            createHoles();
            startTimer();
            
            moleInterval = setInterval(spawnMole, spawnRate);
        }
        
        function endGame(reason) {
            gameRunning = false;
            clearInterval(gameInterval);
            clearInterval(moleInterval);
            
            playSound('gameover');
            
            extraTimeText.classList.remove('show');
            encouragementMessage.classList.remove('show');
            if (extraTimeClock) {
                extraTimeClock.remove();
                extraTimeClock = null;
            }
            extraTimeAvailable = false;
            
            gameOverReason.innerText = reason;
            finalScoreEl.innerText = score;
            gameOverScreen.classList.remove('hidden');
        }
        
        createHoles();
    </script>
</body>
